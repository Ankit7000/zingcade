<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Rainball Rush | Zingcade</title>
    <meta
      name="description"
      content="Dodge the relentless storm. A high-speed, high-tension reflex survival game."
    />
    <link rel="canonical" href="https://zingcade.com/games/rainball-rush/" />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      :root {
        --rush-bg: #03060c;
        --rush-panel: #0a1120;
        --rush-border: #15223a;
        --rush-blue: #8cf5da;
        --rush-red: #ff7d6c;
        --rush-gold: #ffd700;
        --rush-purple: #9061ff;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--rush-bg);
        color: #fff;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        touch-action: none; /* Prevent scroll on touch */
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: rgba(4, 9, 20, 0.95);
        border-bottom: 2px solid var(--rush-border);
        flex-shrink: 0;
        position: relative;
        z-index: 10;
      }
      
      .brand-title {
        font-family: "Orbitron", sans-serif;
        font-size: 1.1rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #fff;
      }

      .btn-hub {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        color: #a0b4d8;
        background: transparent;
        border: 1px solid var(--rush-border);
        padding: 4px 12px;
        border-radius: 6px;
        text-decoration: none;
        text-transform: uppercase;
      }

      /* Game Area */
      .game-shell {
        flex: 1;
        position: relative;
        width: 100%;
        max-width: 600px; /* Keep the playfield focused even on desktop */
        margin: 0 auto;
        background: radial-gradient(circle at 50% 100%, #0a1120, #03060c);
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* DOM HUD layers on top of Canvas */
      .hud-top {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        display: flex;
        justify-content: space-between;
        pointer-events: none; /* Let clicks pass through */
        z-index: 5;
      }

      .score-box {
        text-align: left;
      }

      .score-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        color: #7b94b5;
        text-transform: uppercase;
      }

      .score-value {
        font-family: "Rajdhani", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        margin-top: 2px;
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
      }

      .best-box {
        text-align: right;
      }

      .best-value {
        font-family: "Rajdhani", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--rush-blue);
        line-height: 1;
        margin-top: 2px;
        text-shadow: 0 0 8px rgba(140, 245, 218, 0.4);
      }

      /* Overlays */
      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 100;
      }

      .overlay[hidden] {
        display: none !important;
      }

      .overlay-card {
        background: var(--rush-panel);
        border: 2px solid var(--rush-border);
        border-radius: 16px;
        padding: 32px 24px;
        max-width: 320px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      .alert-title {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: 1.8rem;
        margin: 0 0 8px 0;
        color: var(--rush-red);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-shadow: 0 0 15px rgba(255, 125, 108, 0.4);
      }

      .alert-score {
        font-family: "Rajdhani", sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 24px 0;
      }
      
      .new-record {
        color: var(--rush-gold);
        font-family: "Orbitron";
        font-size: 0.8rem;
        text-transform: uppercase;
        margin-top: -16px;
        margin-bottom: 24px;
        animation: pulse 1s infinite alternate;
      }
      
      @keyframes pulse {
        0% { opacity: 0.7; transform: scale(1); }
        100% { opacity: 1; transform: scale(1.05); }
      }

      .rank-box {
        background: rgba(0,0,0,0.4);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
        margin-bottom: 24px;
      }

      .rank-title {
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        color: #7b94b5;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      
      .rank-val {
        font-family: "Rajdhani", sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
      }

      .btn-primary {
        background: var(--rush-blue);
        color: #03060c;
        border: none;
        padding: 14px 24px;
        font-family: "Rajdhani", sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        width: 100%;
        transition: transform 0.1s;
      }
      
      .btn-primary:active {
        transform: scale(0.95);
      }

      /* Desktop Hints */
      .desktop-hint {
        display: none;
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Orbitron", sans-serif;
        font-size: 0.8rem;
        color: rgba(255,255,255,0.4);
        pointer-events: none;
        z-index: 5;
      }
      
      @media (min-width: 768px) {
        .desktop-hint {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 class="brand-title">Rainball Rush</h1>
      <a href="/games/" class="btn-hub">Hub</a>
    </header>

    <div class="game-shell">
      <div class="hud-top">
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="ui-current">0</div>
        </div>
        <div class="best-box">
          <div class="score-label">Global Best</div>
          <div class="best-value" id="ui-best">0</div>
        </div>
      </div>

      <canvas id="rush-canvas"></canvas>
      
      <div class="desktop-hint">Press [ARROW KEYS] or [A]/[D] to move</div>

      <!-- Start Overlay -->
      <div class="overlay" id="start-overlay">
        <button class="btn-primary" onclick="startGame(event)">Tap To Start</button>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay" id="gameover-overlay" hidden>
        <div class="overlay-card">
          <h2 class="alert-title">Terminated</h2>
          <p class="alert-score" id="go-score">0</p>
          <div class="new-record" id="go-record" hidden>New Best Score!</div>
          
          <div class="rank-box">
            <div class="rank-title">Current Rank</div>
            <div class="rank-val" id="go-rank">Bronze</div>
          </div>
          
          <button class="btn-primary" onclick="startGame(event)">Retry</button>
        </div>
      </div>
    </div>

    <!-- AUDIO CONTEXT -->
    <script>
      let audioCtx;
      function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function tone({ frequency, duration, type, gain }) {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        g.gain.setValueAtTime(gain, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + duration);
      }

      function playSound(k) {
        unlockAudio();
        if (k === "hit") tone({ frequency: 150, duration: 0.3, type: "sawtooth", gain: 0.1 });
        else if (k === "shield") tone({ frequency: 600, duration: 0.2, type: "square", gain: 0.05 });
        else if (k === "break") tone({ frequency: 300, duration: 0.2, type: "square", gain: 0.05 });
        else if (k === "score") tone({ frequency: 800, duration: 0.1, type: "sine", gain: 0.02 });
      }
    </script>

    <!-- ENGINE -->
    <script>
      const cvs = document.getElementById("rush-canvas");
      const ctx = cvs.getContext("2d");
      
      const uiCurrent = document.getElementById("ui-current");
      const uiBest = document.getElementById("ui-best");
      const goScore = document.getElementById("go-score");
      const goRecord = document.getElementById("go-record");
      const goRank = document.getElementById("go-rank");
      
      // Ranks
      const RANKS = [
        { name: "Bronze", cap: 1500, color: "#cd7f32" },
        { name: "Silver", cap: 3500, color: "#c0c0c0" },
        { name: "Gold", cap: 7000, color: "#ffd700" },
        { name: "Platinum", cap: 12000, color: "#e5e4e2" },
        { name: "Diamond", cap: Infinity, color: "#b9f2ff" }
      ];

      // Configuration
      const BALL_RADIUS = 16;
      const MAX_SPEED = 600; // px/sec on keyboard horizontal max
      
      let width, height;
      
      let state = {
        active: false,
        score: 0,
        bestScore: parseInt(localStorage.getItem("zingcade-rush-best")) || 0,
        multiplier: 1.0, 
        lastTime: 0,
        keys: { left: false, right: false }
      };
      
      let player = {
        x: 0,
        y: 0,
        vx: 0,
        shielded: false
      };
      
      let hazards = [];
      let particles = [];
      let spawnTimer = 0;
      let nextSpawnTarget = 0.5;

      uiBest.textContent = state.bestScore;

      function resize() {
        const shell = document.querySelector('.game-shell');
        width = shell.clientWidth;
        height = shell.clientHeight;
        cvs.width = width;
        cvs.height = height;
        
        if (!state.active) {
          player.x = width / 2;
          player.y = height - 100;
          drawStatic();
        } else {
          // ensure player stays bottom aligned if rotation changes
          player.y = height - 100;
        }
      }
      window.addEventListener("resize", resize);

      // --- INPUT HANDLING ---
      // Keyboard Setup
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a") state.keys.left = true;
        if (e.key === "ArrowRight" || e.key === "d") state.keys.right = true;
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a") state.keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d") state.keys.right = false;
      });

      // Touch / Mouse Setup for Mobile Direct Follow
      let dragActive = false;
      let dragStartX = 0;
      let playerStartX = 0;

      function onPointerDown(e) {
        if (!state.active) return;
        dragActive = true;
        dragStartX = e.type.includes("mouse") ? e.clientX : e.touches[0].clientX;
        playerStartX = player.x;
      }

      function onPointerMove(e) {
        if (!dragActive || !state.active) return;
        // prevent page pull-to-refresh
        e.preventDefault(); 
        
        let currentX = e.type.includes("mouse") ? e.clientX : e.touches[0].clientX;
        let delta = currentX - dragStartX;
        
        // Apply 1:1 delta dragging scaling for resolution gaps just in case
        player.x = playerStartX + delta;
        boundPlayer();
      }

      function onPointerUp(e) {
        dragActive = false;
      }
      
      cvs.addEventListener("mousedown", onPointerDown, {passive: false});
      cvs.addEventListener("mousemove", onPointerMove, {passive: false});
      window.addEventListener("mouseup", onPointerUp);
      
      cvs.addEventListener("touchstart", onPointerDown, {passive: false});
      cvs.addEventListener("touchmove", onPointerMove, {passive: false});
      window.addEventListener("touchend", onPointerUp);

      // Math Helpers
      function AABB(c1, c2) {
        const dx = c1.x - c2.x;
        const dy = c1.y - c2.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < c1.radius + c2.radius;
      }
      
      function createParticle(x, y, color) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 400,
          vy: (Math.random() - 0.5) * 400,
          life: 0.5 + Math.random() * 0.5, // seconds
          maxLife: 1.0,
          color
        });
      }

      // --- GAME LOOP ---
      function startGame(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        document.getElementById("start-overlay").hidden = true;
        document.getElementById("gameover-overlay").hidden = true;
        
        unlockAudio();
        resize(); // Force init
        
        state.active = true;
        state.score = 0;
        state.multiplier = 1.0;
        state.keys.left = false;
        state.keys.right = false;
        
        dragActive = false;
        
        player.x = width / 2;
        player.y = height - 100;
        player.vx = 0;
        player.shielded = false;
        
        hazards = [];
        particles = [];
        spawnTimer = 0;
        nextSpawnTarget = 0.5; // Every 0.5s initially
        
        uiCurrent.textContent = "0";
        goRecord.hidden = true;
        
        state.lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      function boundPlayer() {
        if (player.x < BALL_RADIUS) player.x = BALL_RADIUS;
        if (player.x > width - BALL_RADIUS) player.x = width - BALL_RADIUS;
      }

      function loop(now) {
        if (!state.active) return;
        
        const dt = Math.min((now - state.lastTime) / 1000, 0.1); // max 100ms
        state.lastTime = now;
        
        // 1. Ramp difficulty
        state.multiplier += dt * 0.02; // +0.02x speed per second
        state.score += (10 * state.multiplier) * dt; 
        
        // 2. Resolve Player Input (if not dragging via touch)
        if (!dragActive) {
          player.vx = 0;
          if (state.keys.left) player.vx -= MAX_SPEED;
          if (state.keys.right) player.vx += MAX_SPEED;
          player.x += player.vx * dt;
          boundPlayer();
        }
        
        // 3. Spawner
        spawnTimer += dt;
        if (spawnTimer > nextSpawnTarget) {
          spawnTimer = 0;
          nextSpawnTarget = Math.max(0.1, 0.4 - (state.multiplier * 0.05)); // drops to 100ms super fast

          // Choose hazard
          const rand = Math.random();
          let hType = "rain";
          let hColor = "#8cf5da";
          let hSpeed = 250;
          let hRadius = 12 + Math.random() * 8; // 12-20
          
          if (rand > 0.95 && state.multiplier > 1.2) {
            // Shield Pickup
            hType = "shield";
            hColor = "#ffd700";
            hSpeed = 150;
            hRadius = 14;
          } else if (rand > 0.8 && state.multiplier > 1.1) {
            // Fire drop
            hType = "fire";
            hColor = "#ff7d6c";
            hSpeed = 400; 
          } else if (rand > 0.7 && state.multiplier > 1.3) {
            // Spiketrap
            hType = "spike";
            hColor = "#9061ff";
            hSpeed = 200;
          }
          
          hazards.push({
            type: hType,
            color: hColor,
            x: Math.random() * width,
            y: -30,
            radius: hRadius,
            speed: hSpeed,
            osc: Math.random() * Math.PI * 2 // for erratic movements
          });
        }
        
        // 4. Update Hazards & Overlap Detection
        const pObj = { x: player.x, y: player.y, radius: BALL_RADIUS - 2 }; // slight forgive
        let dead = false;
        
        for (let i = hazards.length - 1; i >= 0; i--) {
          let h = hazards[i];
          
          // Motion
          h.y += (h.speed * state.multiplier) * dt;
          
          if (h.type === "spike") {
            h.x += Math.sin(h.y / 50 + h.osc) * 5 * state.multiplier;
          }
          
          // OOB Delete
          if (h.y > height + 50) {
            hazards.splice(i, 1);
            continue;
          }
          
          // Collision
          if (AABB(pObj, h)) {
            if (h.type === "shield") {
              player.shielded = true;
              playSound("shield");
              // particle burst
              for(let j=0; j<10; j++) createParticle(h.x, h.y, h.color);
              hazards.splice(i, 1);
            } else {
              // Enemy Hazard Hit
              if (player.shielded) {
                player.shielded = false;
                playSound("break");
                for(let j=0; j<15; j++) createParticle(h.x, h.y, "#fff");
                hazards.splice(i, 1);
              } else {
                dead = true;
                break;
              }
            }
          }
        }
        
        if (dead) {
          endGame();
          return; // stop execution
        }
        
        // 5. Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
        
        // UI Sync every 10 frames roughly (saves DOM repaints)
        if (Math.random() < 0.1) {
          uiCurrent.textContent = Math.floor(state.score);
        }

        render();
        requestAnimationFrame(loop);
      }

      // --- RENDER ---
      function drawStatic() {
        ctx.clearRect(0, 0, width, height);
        // Player render
        ctx.beginPath();
        ctx.arc(player.x, player.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffffff";
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      function render() {
        ctx.clearRect(0, 0, width, height);
        
        // Hazards
        for (let h of hazards) {
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
          ctx.fillStyle = h.color;
          if (h.type === "shield") {
            ctx.shadowBlur = 15;
            ctx.shadowColor = h.color;
          } else {
            ctx.shadowBlur = 0;
          }
          ctx.fill();
        }
        ctx.shadowBlur = 0;
        
        // Particles
        for (let p of particles) {
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        
        // Player
        ctx.beginPath();
        ctx.arc(player.x, player.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        
        if (player.shielded) {
          ctx.lineWidth = 4;
          ctx.strokeStyle = "#ffd700";
          ctx.stroke();
          ctx.shadowBlur = 25;
          ctx.shadowColor = "#ffd700";
        } else {
          ctx.shadowBlur = 15;
          ctx.shadowColor = "#ffffff";
        }
        
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      function endGame() {
        state.active = false;
        playSound("hit");
        const finalScore = Math.floor(state.score);
        
        let isNewBest = false;
        if (finalScore > state.bestScore) {
          state.bestScore = finalScore;
          localStorage.setItem("zingcade-rush-best", state.bestScore);
          uiBest.textContent = state.bestScore;
          isNewBest = true;
          playSound("score");
        }
        
        // Compute Rank
        let curRank = RANKS[0];
        for (let i = 0; i < RANKS.length; i++) {
          if (state.bestScore < RANKS[i].cap) {
            curRank = RANKS[i];
            break;
          }
        }
        
        goScore.textContent = finalScore;
        goRecord.hidden = !isNewBest;
        goRank.textContent = curRank.name;
        goRank.style.color = curRank.color;
        
        document.getElementById("gameover-overlay").hidden = false;
      }

      // Initial visual setup
      resize();
    </script>
  </body>
</html>
