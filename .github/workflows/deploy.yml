name: Deploy Zingcade

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ZINGCADE_SSH_HOST }}
          username: ${{ secrets.ZINGCADE_SSH_USER }}
          key: ${{ secrets.ZINGCADE_SSH_KEY }}
          script: |
            cd /var/www/zingcade
            echo "Pre-deploy git status:"
            git status --short || true
            git diff --stat || true
            git fetch --prune origin
            git reset --hard origin/main
            git clean -fd
            npm ci
            rm -rf .next out
            npm run build
            rm -rf index.html 404 404.html 500.html _next games raw-games css js images
            cp -a out/. .
            echo "Post-deploy git status:"
            git status --short
